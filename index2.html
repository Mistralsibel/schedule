<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono · 治愈3D日程管理器</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- 防主题闪烁：页面渲染前立即读取主题偏好 -->
    <script>
        (function() {
            const saved = localStorage.getItem("chrono-theme");
            if (saved === "dark") document.documentElement.dataset.theme = "dark";
        })();
    </script>
    <style>
        /* ============================================================
           CHRONO · ETHEREAL GARDEN 设计系统
           世界级玻璃态美学 — 空灵庭园
           ============================================================ */

        /* ---------- RESET ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---------- DESIGN TOKENS :root (浅色) ---------- */
        :root {
            /* 主色调 — 晨雾蓝 */
            --accent: #6D94C0;
            --accent-soft: #8BAFD6;
            --accent-warm: #B8A88A;
            --accent-deep: #4A7098;

            /* 优先级色 */
            --high-prio: #6D94C0;
            --mid-prio: #B8A050;
            --low-prio: #7DA686;
            --overdue: #CC8A8A;

            /* 玻璃态 */
            --glass-bg: rgba(255, 255, 255, 0.30);
            --glass-bg-hover: rgba(255, 255, 255, 0.40);
            --glass-bg-active: rgba(255, 255, 255, 0.48);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-border-strong: rgba(255, 255, 255, 0.60);
            --glass-blur: blur(14px) saturate(1.08);
            --glass-inner-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.50);

            /* 表面色 (别名保持兼容) */
            --bg-card: rgba(255, 255, 255, 0.30);
            --bg-card-hover: rgba(255, 255, 255, 0.40);
            --bg-input: rgba(255, 255, 255, 0.14);
            --bg-input-focus: rgba(255, 255, 255, 0.24);
            --bg-modal: rgba(255, 255, 255, 0.74);
            --bg-notify: rgba(255, 255, 255, 0.68);
            --bg-overlay: rgba(250, 250, 250, 0.66);

            /* 阴影 */
            --shadow-xs: 0 1px 4px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.09);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.13);
            --shadow-card: 0 2px 14px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.09);
            --shadow-modal: 0 18px 52px rgba(0, 0, 0, 0.15);

            /* 发光系统 */
            --glow: 0 0 12px rgba(109, 148, 192, 0.22);
            --glow-strong: 0 0 22px rgba(109, 148, 192, 0.38);
            --glow-accent: 0 0 10px rgba(109, 148, 192, 0.16);
            --glow-overdue: 0 0 12px rgba(204, 138, 138, 0.30);

            /* 文字 */
            --text-primary: #2A2A2C;
            --text-secondary: #7A7A80;
            --text-muted: #A8A8AE;
            --text-inverse: #FFFFFF;

            /* 边框 */
            --border-light: rgba(255, 255, 255, 0.40);
            --border-card: rgba(255, 255, 255, 0.42);
            --border-input: rgba(0, 0, 0, 0.07);
            --border-input-focus: rgba(109, 148, 192, 0.45);

            /* 圆角 */
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;

            /* 动画缓动 */
            --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-fast: 0.18s;
            --duration-normal: 0.32s;
            --duration-slow: 0.50s;

            /* 保持旧变量兼容 */
            --transition-main: 0.32s cubic-bezier(0.22, 1, 0.36, 1);

            /* 字体 */
            --font-sans: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
            --font-serif: "KaiTi", "STKaiti", "Noto Serif SC", "SimSun", serif;
        }

        /* ---------- DESIGN TOKENS [data-theme="dark"] (深色) ---------- */
        [data-theme="dark"] {
            --accent: #8BAFD6;
            --accent-soft: #A0C4E8;
            --accent-warm: #C8B890;
            --accent-deep: #6A90B8;

            --high-prio: #8BAFD6;
            --mid-prio: #C8B060;
            --low-prio: #80A888;
            --overdue: #D49090;

            --glass-bg: rgba(18, 24, 34, 0.40);
            --glass-bg-hover: rgba(18, 24, 34, 0.52);
            --glass-bg-active: rgba(18, 24, 34, 0.60);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-strong: rgba(255, 255, 255, 0.13);
            --glass-inner-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.05);

            --bg-card: rgba(18, 24, 34, 0.40);
            --bg-card-hover: rgba(18, 24, 34, 0.52);
            --bg-input: rgba(18, 24, 34, 0.28);
            --bg-input-focus: rgba(18, 24, 34, 0.40);
            --bg-modal: rgba(14, 18, 26, 0.84);
            --bg-notify: rgba(18, 24, 34, 0.78);
            --bg-overlay: rgba(8, 10, 16, 0.70);

            --shadow-xs: 0 1px 4px rgba(0, 0, 0, 0.12);
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.16);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.22);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.28);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.36);
            --shadow-card: 0 2px 14px rgba(0, 0, 0, 0.16);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.26);
            --shadow-modal: 0 18px 52px rgba(0, 0, 0, 0.42);

            --glow: 0 0 14px rgba(139, 175, 214, 0.22);
            --glow-strong: 0 0 24px rgba(139, 175, 214, 0.36);
            --glow-accent: 0 0 12px rgba(139, 175, 214, 0.18);
            --glow-overdue: 0 0 14px rgba(212, 144, 144, 0.28);

            --text-primary: #E6E6EC;
            --text-secondary: #9494A0;
            --text-muted: #666678;
            --text-inverse: #1A1A20;

            --border-light: rgba(255, 255, 255, 0.09);
            --border-card: rgba(255, 255, 255, 0.09);
            --border-input: rgba(255, 255, 255, 0.07);
            --border-input-focus: rgba(139, 175, 214, 0.40);
        }

        /* ---------- BASE ---------- */
        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background-image: url("https://sybel.oss-cn-hangzhou.aliyuncs.com/beijing%20%281%29.jpg");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-image var(--duration-slow) var(--ease-spring);
        }

        [data-theme="dark"] body {
            background-image: url("https://sybel.oss-cn-hangzhou.aliyuncs.com/n4.webp");
        }

        /* 双层柔焦磨砂遮罩 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background: var(--bg-overlay);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: background var(--duration-slow) var(--ease-spring),
                backdrop-filter var(--duration-slow) var(--ease-spring);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at 50% 40%, transparent 48%, rgba(0, 0, 0, 0.07) 100%);
            pointer-events: none;
            transition: background var(--duration-slow) var(--ease-spring);
        }

        [data-theme="dark"] body::after {
            background: radial-gradient(ellipse at 50% 40%, transparent 48%, rgba(0, 0, 0, 0.20) 100%);
        }

        /* ---------- 3D BACKGROUND CANVAS ---------- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ---------- LAYOUT: 三栏网格 ---------- */
        .app-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr 270px;
            padding: 26px;
            gap: 22px;
        }

        .sidebar-left {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ---------- GLASS PANEL CARD ---------- */
        .panel-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            box-shadow: var(--shadow-card), var(--glass-inner-highlight);
            transition:
                background var(--duration-normal) var(--ease-spring),
                box-shadow var(--duration-normal) var(--ease-spring),
                transform var(--duration-normal) var(--ease-spring),
                border-color var(--duration-normal) var(--ease-spring);
        }

        .panel-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-strong);
            box-shadow: var(--shadow-hover), var(--glass-inner-highlight);
            transform: translateY(-1px);
        }

        /* ---------- USER PANEL ---------- */
        .panel-username .panel-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
            flex-wrap: nowrap;
            width: 100%;
        }

        .panel-title-wrap {
            flex: 1;
            min-width: 0;
        }

        .name-edit-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .name-edit-wrap h1 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        .edit-name-btn {
            width: 22px;
            height: 22px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--duration-fast) var(--ease-spring);
        }

        .edit-name-btn:hover {
            background: var(--glow-accent);
            color: var(--accent);
            border-color: var(--accent);
            transform: scale(1.10);
        }

        .panel-username .date-text {
            color: var(--text-secondary);
            font-size: 13px;
            letter-spacing: 0.03em;
            margin-top: 2px;
        }

        /* 寄语 */
        .motto-wrap {
            margin-top: 14px;
        }

        .motto-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            border-radius: var(--radius-md);
            padding: 13px 12px;
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 14px;
            letter-spacing: 0.02em;
            line-height: 1.5;
            font-weight: 300;
            min-height: 50px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            caret-color: var(--accent);
            transition: all var(--duration-normal) var(--ease-spring);
        }

        .motto-input:focus {
            outline: none;
            border-color: var(--border-input-focus);
            background: var(--bg-input-focus);
            box-shadow: var(--glow-accent);
        }

        .motto-input::placeholder {
            font-family: var(--font-serif);
            color: var(--text-muted);
            font-style: italic;
            letter-spacing: 0.02em;
            font-size: 13px;
        }

        /* ---------- THEME TOGGLE ---------- */
        .theme-toggle-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(109, 148, 192, 0.25);
            background: rgba(109, 148, 192, 0.10);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: var(--accent);
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 0 6px rgba(109, 148, 192, 0.06);
            flex-shrink: 0;
            transition: all var(--duration-normal) var(--ease-spring);
        }

        .theme-toggle-btn:hover {
            background: rgba(109, 148, 192, 0.20);
            box-shadow: 0 0 16px rgba(109, 148, 192, 0.20);
            transform: translateY(-2px);
        }

        .theme-toggle-btn:active {
            transform: scale(0.94);
        }

        [data-theme="dark"] .theme-toggle-btn {
            background: rgba(139, 175, 214, 0.16);
            color: #A8C4E4;
            box-shadow: 0 0 8px rgba(139, 175, 214, 0.10);
        }

        [data-theme="dark"] .theme-toggle-btn:hover {
            background: rgba(139, 175, 214, 0.26);
            box-shadow: 0 0 18px rgba(139, 175, 214, 0.24);
        }

        .theme-toggle-btn svg {
            transition: transform 0.5s var(--ease-spring);
        }

        [data-theme="dark"] .theme-toggle-btn svg {
            transform: rotate(180deg);
        }

        .theme-text {
            font-size: 12px;
            letter-spacing: 0.05em;
            font-weight: 400;
        }

        /* ---------- NAV BUTTONS ---------- */
        .func-btn {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: none;
            background: transparent;
            text-align: left;
            font-size: 15px;
            font-family: var(--font-sans);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            letter-spacing: 0.02em;
            position: relative;
            transition: all var(--duration-fast) var(--ease-spring);
        }

        .func-btn:hover {
            background: rgba(109, 148, 192, 0.08);
            padding-left: 20px;
        }

        .func-btn.active {
            background: rgba(109, 148, 192, 0.14);
            box-shadow: inset 3px 0 0 var(--accent);
            font-weight: 500;
        }

        .filter-section-label {
            margin-bottom: 8px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0 4px;
        }

        .create-task-btn {
            margin-top: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            color: var(--text-inverse);
            font-weight: 500;
            justify-content: center;
            letter-spacing: 0.04em;
            border-radius: var(--radius-md);
            box-shadow: 0 4px 14px rgba(109, 148, 192, 0.28);
            transition: all var(--duration-normal) var(--ease-bounce);
        }

        .create-task-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(109, 148, 192, 0.40);
            padding-left: 16px;
        }

        .create-task-btn:active {
            transform: scale(0.97);
        }

        /* ---------- MAIN CONTENT ---------- */
        .main-content {
            overflow-y: auto;
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px;
        }

        .day-title {
            font-size: 26px;
            font-weight: 350;
            letter-spacing: 0.03em;
            color: var(--text-primary);
        }

        .control-group {
            display: flex;
            gap: 8px;
        }

        .control-group button {
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-secondary);
            font-size: 13px;
            font-family: var(--font-sans);
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all var(--duration-fast) var(--ease-spring);
        }

        .control-group button:hover {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
            border-color: var(--accent);
            box-shadow: var(--glow-accent);
            transform: translateY(-1px);
        }

        /* ---------- TASK CARD ---------- */
        .task-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.22));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            padding: 16px 16px 16px 18px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-xs);
            cursor: grab;
            position: relative;
            overflow: hidden;
            transition:
                transform 0.28s var(--ease-bounce),
                box-shadow 0.32s var(--ease-spring),
                background 0.32s var(--ease-spring),
                border-color 0.32s var(--ease-spring),
                opacity 0.25s var(--ease-spring);
            animation: cardEnter 0.45s var(--ease-out-expo) both;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [data-theme="dark"] .task-card {
            background: linear-gradient(135deg, rgba(22, 28, 38, 0.38), rgba(16, 22, 32, 0.32));
        }

        .task-card:hover {
            transform: translateY(-3px);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-md);
            border-color: var(--glass-border-strong);
        }

        .task-card:active {
            cursor: grabbing;
            transform: scale(0.985);
        }

        /* 左侧优先级色条 */
        .task-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            transition: box-shadow var(--duration-normal) var(--ease-spring);
        }

        .task-prio-high::before {
            background: var(--high-prio);
            box-shadow: 0 0 8px rgba(109, 148, 192, 0.35);
        }

        .task-prio-mid::before {
            background: var(--mid-prio);
            box-shadow: 0 0 8px rgba(184, 160, 80, 0.30);
        }

        .task-prio-low::before {
            background: var(--low-prio);
            box-shadow: 0 0 8px rgba(125, 166, 134, 0.30);
        }

        .task-overdue::before {
            background: var(--overdue);
            box-shadow: var(--glow-overdue);
            animation: overduePulse 2.0s infinite ease-in-out;
        }

        @keyframes overduePulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(204, 138, 138, 0.25);
            }
            50% {
                box-shadow: 0 0 16px rgba(204, 138, 138, 0.50);
            }
        }

        .task-running {
            animation: taskBreathe 2.4s infinite ease-in-out;
        }

        @keyframes taskBreathe {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(109, 148, 192, 0.18), var(--shadow-xs);
            }
            50% {
                box-shadow: 0 0 26px rgba(109, 148, 192, 0.36), var(--shadow-sm);
            }
        }

        .task-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
            letter-spacing: 0.02em;
            color: var(--text-primary);
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .task-desc-inline {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .task-done {
            opacity: 0.50;
        }

        .task-done .task-title {
            text-decoration: line-through;
            text-decoration-color: var(--text-muted);
            text-decoration-thickness: 1px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .task-actions button {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all var(--duration-fast) var(--ease-spring);
        }

        .task-actions button:hover {
            background: rgba(109, 148, 192, 0.10);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .task-actions .btn-del:hover {
            background: rgba(204, 138, 138, 0.12);
            border-color: var(--overdue);
            color: var(--overdue);
        }

        /* 任务完成脉冲 */
        .task-complete-flash {
            animation: completeFlash 0.6s var(--ease-out-expo);
        }

        @keyframes completeFlash {
            0% {
                box-shadow: 0 0 0 rgba(125, 166, 134, 0.55), var(--shadow-xs);
            }
            100% {
                box-shadow: 0 0 0 rgba(125, 166, 134, 0), var(--shadow-xs);
            }
        }

        /* ---------- STAT ITEMS ---------- */
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            transition: background var(--duration-fast) var(--ease-spring);
        }

        .stat-item:hover {
            background: rgba(109, 148, 192, 0.06);
        }

        .stat-item span:first-child {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
        }

        .stat-item span:last-child {
            font-size: 15px;
            font-weight: 500;

<script>
    /* ================================================================
       CHRONO · APPLICATION LOGIC
       所有核心功能保持不变，修复已知Bug
       ================================================================ */

    const STORAGE_KEY = "chrono-task-data";
    const USER_STORAGE = "chrono-user-info";
    const THEME_KEY = "chrono-theme";

    // ---- 用户信息 ----
    let userInfo = JSON.parse(localStorage.getItem(USER_STORAGE)) || {
        name: "Chrono 日程",
        motto: "",
        lastTaskDate: Date.now(),
        completeCount: 0
    };

    document.getElementById("user-name-display").innerText = userInfo.name;
    document.getElementById("user-motto").value = userInfo.motto;

    function saveUserInfo() {
        localStorage.setItem(USER_STORAGE, JSON.stringify(userInfo));
    }

    // ---- 昵称弹窗 ----
    const nameModal = document.getElementById("name-modal");
    document.getElementById("open-name-modal").onclick = () => {
        document.getElementById("new-user-name").value = userInfo.name;
        nameModal.style.display = "flex";
    };
    document.getElementById("close-name-modal").onclick = () => nameModal.style.display = "none";
    document.getElementById("save-name").onclick = () => {
        const newName = document.getElementById("new-user-name").value.trim();
        if (!newName) return showNotify("昵称不能为空");
        userInfo.name = newName;
        document.getElementById("user-name-display").innerText = newName;
        saveUserInfo();
        nameModal.style.display = "none";
        showNotify("昵称修改成功");
    };

    // ---- 寄语实时保存 + 15字限制 ----
    document.getElementById("user-motto").oninput = (e) => {
        const input = e.target;
        const warnDom = document.getElementById("motto-warn-text");
        if (input.value.length > 15) {
            warnDom.style.display = "block";
            input.value = input.value.slice(0, 15);
        } else {
            warnDom.style.display = "none";
            userInfo.motto = input.value;
            saveUserInfo();
        }
    };

    // ---- 任务数据 ----
    let taskList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentView = "day";
    let currentFilter = "all";
    let editTaskId = null;

    const today = new Date();
    document.getElementById("today-date").innerText =
        today.toLocaleDateString("zh-CN", { weekday: "long", month: "long", day: "numeric" });

    function saveStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(taskList));
        renderAll();
    }

    function getNowTime() { return new Date().getTime(); }

    function isTaskRunning(start, end) {
        const now = getNowTime();
        return now >= new Date(start).getTime() && now < new Date(end).getTime();
    }

    function isTaskOverdue(end) {
        return getNowTime() > new Date(end).getTime();
    }

    function showNotify(text) {
        const bar = document.getElementById("notify");
        bar.innerText = text;
        bar.classList.add("show");
        setTimeout(() => bar.classList.remove("show"), 3000);
    }

    function isValidDate(d) {
        return d instanceof Date && !isNaN(d.getTime());
    }

    function renderAll() {
        renderTaskList();
        renderStat();
        if (typeof renderOrbitPoints === "function") renderOrbitPoints();
    }

    // ---- 任务列表渲染 ----
    function renderTaskList() {
        const wrap = document.getElementById("task-list");
        wrap.innerHTML = "";
        let filterTasks = taskList;

        if (currentFilter !== "all") filterTasks = taskList.filter(t => t.type === currentFilter);

        if (currentView === "day") {
            document.querySelector(".day-title").innerText = "今日安排";
            const todayStr = new Date().toISOString().slice(0, 10);
            filterTasks = filterTasks.filter(item => item.start.slice(0, 10) === todayStr);
        } else if (currentView === "week") {
            document.querySelector(".day-title").innerText = "本周全部日程";
            const now = new Date();
            const day = now.getDay();
            const weekStart = new Date(now.getTime() - day * 24 * 3600 * 1000);
            const weekEnd = new Date(weekStart.getTime() + 6 * 24 * 3600 * 1000);
            filterTasks = filterTasks.filter(item => {
                const t = new Date(item.start);
                return t >= weekStart && t <= weekEnd;
            });
        } else if (currentView === "stat") {
            document.querySelector(".day-title").innerText = "日程数据统计";
            const total = filterTasks.length;
            const done = filterTasks.filter(t => t.done).length;
            const work = filterTasks.filter(t => t.type === "work").length;
            const study = filterTasks.filter(t => t.type === "study").length;
            const life = filterTasks.filter(t => t.type === "life").length;
            const high = filterTasks.filter(t => t.prio === "high").length;
            wrap.innerHTML = `
            <div style="padding:20px 0;line-height:1.8;">
              <div class="stat-view-card">
                <h4>任务总量概况</h4>
                <p>全部任务：${total} 条</p>
                <p>已完成任务：${done} 条</p>
                <p>完成率：${total > 0 ? Math.round(done / total * 100) : 0}%</p>
              </div>
              <div class="stat-view-card">
                <h4>分类分布</h4>
                <p>工作任务：${work} 条</p>
                <p>学习任务：${study} 条</p>
                <p>生活任务：${life} 条</p>
              </div>
              <div class="stat-view-card">
                <h4>优先级分布</h4>
                <p>高优先级任务：${high} 条</p>
                <p>中优先级任务：${filterTasks.filter(t => t.prio === "mid").length} 条</p>
                <p>低优先级任务：${filterTasks.filter(t => t.prio === "low").length} 条</p>
              </div>
            </div>
          `;
            return;
        }

        filterTasks.sort((a, b) => new Date(a.start) - new Date(b.start));

        if (filterTasks.length === 0) {
            wrap.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                   stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
              </svg>
              暂无日程，点击左侧「+ 新建日程」开始规划
            </div>`;
            return;
        }

        filterTasks.forEach((task, index) => {
            const card = document.createElement("div");
            let prioClass = `task-prio-${task.prio}`;
            if (!task.done && isTaskOverdue(task.end)) prioClass = "task-overdue";
            let runClass = (!task.done && isTaskRunning(task.start, task.end)) ? "task-running" : "";
            let doneClass = task.done ? "task-done" : "";
            const sTime = new Date(task.start).toLocaleString("zh-CN");
            const eTime = new Date(task.end).toLocaleString("zh-CN");
            card.className = `task-card ${prioClass} ${runClass} ${doneClass}`;
            card.dataset.id = task.id;
            card.style.animationDelay = `${index * 0.04}s`;
            card.innerHTML = `
            <div class="task-title">${task.title}</div>
            <div class="task-meta">
              <span>${sTime} ~ ${eTime}</span>
              <span>${task.type === "work" ? "工作" : task.type === "study" ? "学习" : "生活"}</span>
            </div>
            ${task.desc ? `<div class="task-desc-inline">${task.desc}</div>` : ""}
            <div class="task-actions">
              <button class="btn-done">${task.done ? "撤销完成" : "标记完成"}</button>
              <button class="btn-edit">编辑</button>
              <button class="btn-del">删除</button>
            </div>
          `;

            card.querySelector(".btn-done").onclick = () => {
                const wasDone = task.done;
                task.done = !task.done;
                if (task.done && !wasDone) {
                    userInfo.completeCount += 1;
                    userInfo.lastTaskDate = Date.now();
                    saveUserInfo();
                    card.classList.add("task-complete-flash");
                    setTimeout(() => card.classList.remove("task-complete-flash"), 650);
                }
                saveStorage();
                if (task.done && !wasDone) showNotify("已完成一项任务，灵树结出新果实 ✨");
            };
            card.querySelector(".btn-edit").onclick = () => openEditModal(task.id);
            card.querySelector(".btn-del").onclick = () => {
                card.style.opacity = "0";
                card.style.transform = "scale(0.92)";
                setTimeout(() => {
                    taskList = taskList.filter(t => t.id !== task.id);
                    saveStorage();
                    showNotify("任务已删除");
                }, 220);
            };
            wrap.appendChild(card);
        });
    }

    // ---- 统计面板 ----
    function renderStat() {
        const total = taskList.length;
        const done = taskList.filter(t => t.done).length;
        const running = taskList.filter(t => !t.done && isTaskRunning(t.start, t.end)).length;
        const rate = total === 0 ? "0%" : Math.round(done / total * 100) + "%";
        document.getElementById("stat-total").innerText = total;
        document.getElementById("stat-done").innerText = done;
        document.getElementById("stat-running").innerText = running;
        document.getElementById("stat-rate").innerText = rate;
    }

    // ---- 任务弹窗 ----
    const modal = document.getElementById("task-modal");
    const inputs = {
        title: document.getElementById("task-title"),
        type: document.getElementById("task-type"),
        prio: document.getElementById("task-prio"),
        start: document.getElementById("task-start"),
        end: document.getElementById("task-end"),
        desc: document.getElementById("task-desc")
    };

    function openModal() {
        editTaskId = null;
        modal.style.display = "flex";
        const now = new Date();
        const t1 = new Date(now.getTime() + 3600 * 1000);
        const t2 = new Date(now.getTime() + 2 * 3600 * 1000);
        inputs.start.value = t1.toISOString().slice(0, 16);
        inputs.end.value = t2.toISOString().slice(0, 16);
        inputs.title.value = "";
        inputs.desc.value = "";
        inputs.type.value = "work";
        inputs.prio.value = "mid";
    }

    function openEditModal(id) {
        editTaskId = id;
        const task = taskList.find(t => t.id === id);
        if (!task) return;
        modal.style.display = "flex";
        inputs.title.value = task.title;
        inputs.type.value = task.type;
        inputs.prio.value = task.prio;
        inputs.start.value = task.start;
        inputs.end.value = task.end;
        inputs.desc.value = task.desc || "";
    }

    function closeModal() { modal.style.display = "none"; }

    document.getElementById("open-modal").onclick = openModal;
    document.getElementById("close-modal").onclick = closeModal;

    document.getElementById("save-task").onclick = () => {
        const title = inputs.title.value.trim();
        const startStr = inputs.start.value.trim();
        const endStr = inputs.end.value.trim();
        if (!title) return showNotify("请填写任务标题");
        if (!startStr || !endStr) return showNotify("请完整选择开始与结束时间");
        const startTime = new Date(startStr);
        const endTime = new Date(endStr);
        if (!isValidDate(startTime) || !isValidDate(endTime)) {
            return showNotify("选择的时间格式无效，请重新选择");
        }
        if (endTime <= startTime) {
            return showNotify("错误：结束时间不能早于或等于开始时间，请重新调整时间");
        }
        const data = {
            id: editTaskId || Date.now().toString(),
            title,
            type: inputs.type.value,
            prio: inputs.prio.value,
            start: startStr,
            end: endStr,
            desc: inputs.desc.value.trim(),
            done: false
        };
        if (editTaskId) {
            const idx = taskList.findIndex(t => t.id === editTaskId);
            if (idx !== -1) taskList[idx] = data;
        } else {
            taskList.push(data);
        }
        closeModal();
        saveStorage();
        showNotify("日程保存成功 ✓");
    };

    // ---- 专注模式 ----
    document.getElementById("focus-btn").onclick = () => {
        document.body.classList.toggle("focus-mode");
        const isFocus = document.body.classList.contains("focus-mode");
        const btn = document.getElementById("focus-btn");
        if (isFocus) {
            btn.innerText = "退出专注";
            btn.style.background = "rgba(109,148,192,0.22)";
            btn.style.color = "var(--accent)";
            showNotify("已进入专注模式，右上角按钮可随时退出");
        } else {
            btn.innerText = "专注模式";
            btn.style.background = "";
            btn.style.color = "";
            showNotify("已退出专注模式");
        }
    };

    document.getElementById("focus-exit").onclick = () => {
        document.body.classList.remove("focus-mode");
        const btn = document.getElementById("focus-btn");
        btn.innerText = "专注模式";
        btn.style.background = "";
        btn.style.color = "";
        showNotify("已退出专注模式");
    };

    // ---- 主题切换 (data-theme 设在 <html> 上以支持 body 后代选择器) ----
    document.getElementById("theme-switch").onclick = () => {
        const current = document.documentElement.dataset.theme;
        const next = current === "dark" ? "" : "dark";
        document.documentElement.dataset.theme = next;
        localStorage.setItem(THEME_KEY, next);
    };

    // ---- Excel 导出 ----
    document.getElementById("export-data").onclick = () => {
        if (taskList.length === 0) return showNotify("暂无数据可导出");
        const exportData = taskList.map(task => ({
            "任务ID": task.id,
            "任务标题": task.title,
            "分类": task.type === "work" ? "工作" : task.type === "study" ? "学习" : "生活",
            "优先级": task.prio === "high" ? "高" : task.prio === "mid" ? "中" : "低",
            "开始时间": new Date(task.start).toLocaleString("zh-CN"),
            "结束时间": new Date(task.end).toLocaleString("zh-CN"),
            "备注": task.desc,
            "完成状态": task.done ? "已完成" : "未完成"
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "日程数据");
        const excelBuffer = XLSX.write(wb, { bookType: "xlsx", type: "array" });
        const blob = new Blob([excelBuffer], { type: "application/octet-stream" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "日程管理数据.xlsx";
        a.click();
        URL.revokeObjectURL(a.href);
        showNotify("Excel数据导出完成");
    };

    // ---- 清空已完成 ----
    document.getElementById("clear-done").onclick = () => {
        const doneCount = taskList.filter(t => t.done).length;
        if (doneCount === 0) return showNotify("没有已完成的任务");
        taskList = taskList.filter(t => !t.done);
        saveStorage();
        showNotify(`已清空 ${doneCount} 项已完成任务`);
    };

    // ---- 视图切换 ----
    document.querySelectorAll("[data-view]").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll("[data-view]").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentView = btn.dataset.view;
            renderAll();
        };
    });

    // ---- 分类筛选 (修复: 补充缺失的事件绑定) ----
    document.querySelectorAll("[data-filter]").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll("[data-filter]").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            renderAll();
        };
    });

    // ================================================================
    // THREE.JS — 背景粒子系统 (修复: 删除空壳包装函数，统一结构)
    // ================================================================
    function getWeatherType() {
        const hour = new Date().getHours();
        if (hour >= 12 && hour <= 18) return "sunny";
        if (hour >= 6 && hour <= 12) return "cloudy";
        return "rain";
    }

    function initBgThree() {
        const canvas = document.getElementById("bg-canvas");
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 30;

        const count = 600;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        const vel = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            pos[i * 3] = (Math.random() - 0.5) * 60;
            pos[i * 3 + 1] = (Math.random() - 0.5) * 40;
            pos[i * 3 + 2] = (Math.random() - 0.5) * 20;
            vel[i * 3] = (Math.random() - 0.5) * 0.02;
            vel[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
            vel[i * 3 + 2] = (Math.random() - 0.5) * 0.01;
        }
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));

        const weather = getWeatherType();
        let particleColor;
        if (weather === "sunny") particleColor = new THREE.Color("#7a9ec4");
        else if (weather === "cloudy") particleColor = new THREE.Color("#b0b8c8");
        else particleColor = new THREE.Color("#a0b4cc");

        const particleMat = new THREE.PointsMaterial({
            size: 0.18,
            transparent: true,
            opacity: 0.45,
            sizeAttenuation: true,
            color: particleColor,
            blending: THREE.NormalBlending,
            depthWrite: false,
        });

        const points = new THREE.Points(geo, particleMat);
        scene.add(points);

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const pArr = geo.attributes.position.array;
            for (let i = 0; i < count; i++) {
                pArr[i * 3] += vel[i * 3];
                pArr[i * 3 + 1] += vel[i * 3 + 1];
                if (Math.abs(pArr[i * 3]) > 30) vel[i * 3] *= -1;
                if (Math.abs(pArr[i * 3 + 1]) > 20) vel[i * 3 + 1] *= -1;
            }
            geo.attributes.position.needsUpdate = true;
            points.rotation.y += 0.0007;
            renderer.render(scene, camera);
        }
        animate();
    }

    // ================================================================
    // THREE.JS — 轨道可视化
    // ================================================================
    function initOrbitThree() {
        const canvas = document.getElementById("orbit-canvas");
        const wrap = document.getElementById("orbit-canvas-wrap");
        const w = wrap.clientWidth;
        const h = wrap.clientHeight;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(w, h);
        camera.position.set(0, -0.15, 4.2);

        const ringGeo = new THREE.RingGeometry(1.3, 1.7, 64);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x7a9ec4,
            transparent: true,
            opacity: 0.18,
            side: THREE.DoubleSide,
            depthWrite: false,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        scene.add(ring);

        const pointGroup = new THREE.Group();
        scene.add(pointGroup);

        window.renderOrbitPoints = function() {
            while (pointGroup.children.length > 0) {
                pointGroup.remove(pointGroup.children[0]);
            }
            taskList.forEach(task => {
                const tStart = new Date(task.start).getHours();
                const rad = (tStart / 24) * Math.PI * 2;
                const r = 1.5;
                const x = Math.cos(rad) * r;
                const y = Math.sin(rad) * r;
                let color = 0x7DA686;
                let size = 0.08;
                if (task.done) color = 0xA8B8C8;
                else if (isTaskRunning(task.start, task.end)) { color = 0x6D94C0;
                    size = 0.14; } else if (isTaskOverdue(task.end)) color = 0xCC8A8A;
                const pGeo = new THREE.SphereGeometry(size, 10, 10);
                const pMat = new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.82,
                    depthWrite: false,
                });
                const mesh = new THREE.Mesh(pGeo, pMat);
                mesh.position.set(x, y, 0.05);
                pointGroup.add(mesh);
            });
        };

        window.addEventListener("resize", () => {
            const nw = wrap.clientWidth;
            const nh = wrap.clientHeight;
            camera.aspect = nw / nh;
            camera.updateProjectionMatrix();
            renderer.setSize(nw, nh);
        });

        function animateOrbit() {
            requestAnimationFrame(animateOrbit);
            ring.rotation.z += 0.0015;
            pointGroup.rotation.z += 0.0015;
            renderer.render(scene, camera);
        }
        animateOrbit();
        window.renderOrbitPoints();
    }

    // ================================================================
    // THREE.JS — 底部许愿灵树
    // ================================================================
    function initWishTree() {
        const canvas = document.getElementById("tree-canvas");
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 50);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        camera.position.set(0, 2, 8);

        const trunkGeo = new THREE.CylinderGeometry(0.12, 0.22, 3.5, 12);
        const trunkMat = new THREE.MeshBasicMaterial({
            color: 0x6B5848,
            transparent: true,
            opacity: 0.70,
            depthWrite: false,
        });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = -1.8;
        scene.add(trunk);

        const branchGroup = new THREE.Group();
        scene.add(branchGroup);

        const fruitPool = [];

        const now = Date.now();
        const idleDay = (now - userInfo.lastTaskDate) / (1000 * 60 * 60 * 24);
        const isWither = idleDay > 7;

        const leafColor = isWither ? 0xB8A268 : 0x78B978;

        function createBranch(x, z, scale) {
            const leafGeo = new THREE.SphereGeometry(0.8 * scale, 8, 8);
            const leafMat = new THREE.MeshBasicMaterial({
                color: leafColor,
                transparent: true,
                opacity: 0.58,
                depthWrite: false,
            });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.set(x, 0, z);
            branchGroup.add(leaf);
        }
        createBranch(-1.4, -1, 1);
        createBranch(1.2, -0.6, 0.85);
        createBranch(-0.6, 1.2, 0.9);
        createBranch(1.3, 0.9, 0.75);

        for (let i = 0; i < userInfo.completeCount; i++) {
            const fruitGeo = new THREE.SphereGeometry(0.16, 10, 10);
            const fruitMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color("#6D94C0"),
                transparent: true,
                opacity: 0.85,
                depthWrite: false,
            });
            fruitMat.emissive = new THREE.Color("#6D94C0");
            fruitMat.emissiveIntensity = 0.4;
            const fruit = new THREE.Mesh(fruitGeo, fruitMat);
            fruit.position.set(
                (Math.random() - 0.5) * 2.2,
                Math.random() * 1.6,
                (Math.random() - 0.5) * 1.6
            );
            fruit.userData.floatSpeed = 0.008 + Math.random() * 0.004;
            fruitPool.push(fruit);
            branchGroup.add(fruit);
        }

        let leafFallArr = [];
        if (isWither) {
            for (let i = 0; i < 25; i++) {
                const fallGeo = new THREE.CircleGeometry(0.12, 6);
                const fallMat = new THREE.MeshBasicMaterial({
                    color: 0xD4B878,
                    transparent: true,
                    opacity: 0.7,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                });
                const fallLeaf = new THREE.Mesh(fallGeo, fallMat);
                fallLeaf.position.set((Math.random() - 0.5) * 4, 3, (Math.random() - 0.5) * 3);
                fallLeaf.userData.speedY = 0.012 + Math.random() * 0.008;
                leafFallArr.push(fallLeaf);
                scene.add(fallLeaf);
            }
        }

        window.addEventListener("resize", () => {
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        function treeAnimate() {
            requestAnimationFrame(treeAnimate);
            branchGroup.rotation.y += 0.0006;
            fruitPool.forEach(fruit => {
                fruit.position.y += Math.sin(Date.now() * 0.001 * fruit.userData.floatSpeed) * 0.004;
                fruit.material.emissiveIntensity = 0.3 + Math.sin(Date.now() * 0.0015) * 0.15;
            });
            leafFallArr.forEach(leaf => {
                leaf.position.y -= leaf.userData.speedY;
                leaf.rotation.z += 0.012;
                if (leaf.position.y < -3) {
                    leaf.position.y = 3;
                    leaf.position.x = (Math.random() - 0.5) * 4;
                    leaf.position.z = (Math.random() - 0.5) * 3;
                }
            });
            renderer.render(scene, camera);
        }
        treeAnimate();
    }

    // ================================================================
    // ================================================================
    // 初始化入口
    // ================================================================
    // ① 任务渲染：纯 DOM 操作，立即执行，不等任何资源
    renderAll();

    // ② Three.js 场景：THREE 已由前置 <script> 加载完毕，仅需等首帧
    //    CSS 布局计算完成（~16ms），远快于 window.onload（需等背景图下载）
    let _threeReady = false;
    requestAnimationFrame(() => {
        if (_threeReady) return;
        _threeReady = true;
        initBgThree();
        initOrbitThree();
        initWishTree();
        if (typeof renderOrbitPoints === "function") renderOrbitPoints();
    });

    // ③ 兜底：万一 requestAnimationFrame 因特殊原因未触发，onload 补刀
    window.onload = () => {
        if (!_threeReady) {
            _threeReady = true;
            initBgThree();
            initOrbitThree();
            initWishTree();
            if (typeof renderOrbitPoints === "function") renderOrbitPoints();
        }

        if (document.body.classList.contains("focus-mode")) {
            const fb = document.getElementById("focus-btn");
            fb.innerText = "退出专注";
            fb.style.background = "rgba(109,148,192,0.22)";
            fb.style.color = "var(--accent)";
        }

        setInterval(() => renderAll(), 60000);
    };
</script>
